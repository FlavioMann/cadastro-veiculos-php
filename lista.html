<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <title>Listagem</title>
    <style>
      table {
        width: 100%;
        border-collapse: collapse;
        margin-top: 20px;
      }
      th,
      td {
        border: 1px solid #ddd;
        padding: 12px;
        text-align: left;
      }
      th {
        background-color: #007bff;
        color: white;
      }
    </style>
  </head>
  <body>
    <h2>Veículos Cadastrados</h2>
    <table id="tabela">
      <thead>
        <tr>
          <th>Placa</th>
          <th>Marca</th>
          <th>Modelo</th>
          <th>Cor</th>
          <th>KM</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>
    <br />
    <a href="index.html">Voltar para Cadastro</a>

    <script>
      // JS consome o JSON do listar.php para montar a tabela
      fetch("listar.php")
        .then((res) => res.json())
        .then((veiculos) => {
          const corpoTabela = document.querySelector("#tabela tbody");
          veiculos.forEach((v) => {
            corpoTabela.innerHTML += `<tr>
                    <td>${v.placa}</td><td>${v.marca}</td>
                    <td>${v.modelo}</td><td>${v.cor}</td><td>${v.quilometragem}</td>
                </tr>`;
          });
        });
    </script>
  </body>
</html>
